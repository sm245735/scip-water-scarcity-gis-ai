[pytest]
# pytest 設定檔
# 執行時：pytest（會自動讀這個檔）

# 測試檔案模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 顯示設定
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes

# 測試路徑
testpaths = tests

# 警告處理
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
